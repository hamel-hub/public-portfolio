<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Security+ Trainer App</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: Arial;
    background: #050b18;
    color: white;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #0f1a33;
    padding: 20px;
    border-radius: 12px;
}

h1 { color: #38bdf8; }

.question {
    font-size: 20px;
    margin: 20px 0;
}

.answers button {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #1e2a4a;
    color: white;
    font-size: 16px;
}

.correct { background: #16a34a !important; }
.wrong { background: #dc2626 !important; }

.info {
    margin-top: 10px;
    padding: 10px;
    background: #111c33;
    border-radius: 8px;
    min-height: 40px;
}

.stats {
    color: #38bdf8;
    margin-bottom: 10px;
}

button.control {
    margin: 5px;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    background: #38bdf8;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>🛡 Security+ Trainer App</h1>

<div class="stats" id="stats"></div>

<div class="question" id="question"></div>
<div class="answers" id="answers"></div>

<div class="info" id="info"></div>

<button class="control" onclick="next()">Next</button>
<button class="control" onclick="restart()">Restart</button>

</div>

<script>

// Load saved progress
let xp = parseInt(localStorage.getItem("xp")) || 0;
let index = parseInt(localStorage.getItem("index")) || 0;
let correct = parseInt(localStorage.getItem("correct")) || 0;

const game = [
{
q:"What is phishing?",
a:["Firewall","Fake emails to steal data","Encryption","Backup"],
correct:1,
ex:"Phishing tricks users into giving sensitive info."
},
{
q:"What is MFA?",
a:["One password","Multiple verification methods","No login","Firewall"],
correct:1,
ex:"MFA uses 2+ authentication factors."
},
{
q:"What does a firewall do?",
a:["Encrypt data","Block unauthorized traffic","Delete viruses","Speed up internet"],
correct:1,
ex:"Firewalls filter network traffic."
},
{
q:"What is ransomware?",
a:["Backup tool","Malware that locks files","VPN","Firewall"],
correct:1,
ex:"Ransomware encrypts files for payment."
}
];

function save(){
localStorage.setItem("xp",xp);
localStorage.setItem("index",index);
localStorage.setItem("correct",correct);
}

function update(){
document.getElementById("stats").innerText =
`XP: ${xp} | Progress: ${index+1}/${game.length}`;
save();
}

function load(){
let q = game[index];
document.getElementById("question").innerText = q.q;

let box = document.getElementById("answers");
box.innerHTML = "";
document.getElementById("info").innerText = "";

q.a.forEach((ans,i)=>{
let b = document.createElement("button");
b.innerText = ans;
b.onclick = ()=>pick(b,i);
box.appendChild(b);
});
update();
}

function pick(btn,i){
let q = game[index];
let buttons = document.querySelectorAll(".answers button");

buttons.forEach((b,j)=>{
if(j===q.correct) b.classList.add("correct");
else if(j===i) b.classList.add("wrong");
b.disabled = true;
});

if(i===q.correct){
xp += 10;
correct++;
document.getElementById("info").innerText =
"✔ Correct!\n" + q.ex;
} else {
document.getElementById("info").innerText =
"✘ Wrong!\n" + q.ex;
}

update();
}

function next(){
if(index < game.length - 1){
index++;
load();
} else {
document.body.innerHTML =
`<h2 style="color:white;margin-top:50px;">🎉 Completed!<br>XP: ${xp}</h2>`;
localStorage.clear();
}
}

function restart(){
localStorage.clear();
location.reload();
}

load();

</script>

</body>
</html>
