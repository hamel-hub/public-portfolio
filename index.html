<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Security+ SOC Simulator</title>
<style>
body{font-family:Arial,sans-serif;background:#0b1020;color:#fff;margin:0}
header{padding:15px;background:#111936;text-align:center}
main{max-width:900px;margin:auto;padding:20px}
.card{background:#182341;padding:20px;border-radius:12px;margin-bottom:15px}
button{padding:12px 16px;border:none;border-radius:8px;cursor:pointer;margin:6px}
.choice{display:block;width:100%;text-align:left}
.progress{background:#333;height:18px;border-radius:10px;overflow:hidden}
.bar{background:#3ddc84;height:100%;width:0%}
.small{opacity:.8}
</style>
</head>
<body>
<header>
<h1>🛡️ CompTIA Security+ SOC Simulator</h1>
<p>Analyst Career Mode • XP • Badges • Incident Response</p>
</header>
<main>
<div class="card">
<h2 id="rank">Rank: Trainee</h2>
<p>XP: <span id="xp">0</span> | Badges: <span id="badges">0</span></p>
<div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="card">
<h2 id="missionTitle">Mission 1</h2>
<p id="question"></p>
<div id="answers"></div>
<div id="feedback"></div>
</div>

<div class="card">
<h3>Real World Scenario</h3>
<p id="scenario"></p>
<div id="video"></div>
</div>
</main>

<script>
const missions=[
{
title:"Phishing Investigation",
scenario:"Employees report suspicious Microsoft password reset emails.",
q:"What should you do first?",
a:["Click the link","Report as phishing and verify through official channels","Ignore it","Forward to everyone"],
c:1,
e:"Always verify through trusted channels and report phishing.",
v:"https://www.youtube.com/embed/9SD6DRCKZFU"
},
{
title:"Identity & Access Management",
scenario:"A contractor needs temporary access.",
q:"What follows least privilege?",
a:["Admin access","Full domain access","Only required permissions","Shared account"],
c:2,
e:"Grant only what is necessary.",
v:"https://www.youtube.com/embed/NrsumBxWW8A"
},
{
title:"Network Defense",
scenario:"Traffic spikes and systems become unavailable.",
q:"Which attack is most likely?",
a:["DDoS","Tailgating","Vishing","Shoulder Surfing"],
c:0,
e:"DDoS floods resources and affects availability.",
v:"https://www.youtube.com/embed/7zlPNEA8mmU"
}
];

let i=0,xp=0,badges=0;

function load(){
let m=missions[i];
question.innerText=m.q;
missionTitle.innerText=m.title;
scenario.innerText=m.scenario;
feedback.innerHTML="";
video.innerHTML="";
answers.innerHTML="";
m.a.forEach((t,idx)=>{
let b=document.createElement("button");
b.className="choice";
b.innerText=t;
b.onclick=()=>answer(idx);
answers.appendChild(b);
});
}

function answer(idx){
let m=missions[i];
if(idx===m.c){
xp+=25;
if(xp>=50 && badges===0) badges=1;
feedback.innerHTML="<h3>✅ Correct</h3><p>"+m.e+"</p>";
}else{
feedback.innerHTML="<h3>❌ Incorrect</h3><p>"+m.e+"</p>";
video.innerHTML='<iframe width="100%" height="315" src="'+m.v+'" allowfullscreen></iframe>';
}
xpEl();
setTimeout(()=>{
i++;
if(i<missions.length){load();}
else{
document.querySelector("main").innerHTML=`
<div class="card">
<h1>🎉 Simulation Complete</h1>
<p>XP: ${xp}</p>
<p>Exam Readiness: ${Math.min(100,50+xp/2)}%</p>
<p>Add this page to your iPhone Home Screen to use it like an app.</p>
</div>`;
}
},2500);
}

function xpEl(){
xp.innerText=xp;
badgesEl=document.getElementById("badges");
badgesEl.innerText=badges;
bar.style.width=Math.min(100,xp)+"%";
}
load();
</script>
</body>
</html>
