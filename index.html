<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Defense Campaign Mode</title>

<style>
body {
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.header {
padding:12px;
background:#0f172a;
text-align:center;
}

.panel {
margin:10px;
padding:12px;
background:#111c33;
border-radius:12px;
}

button {
margin:5px;
padding:10px;
border:none;
border-radius:8px;
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

button:hover {
background:#0ea5e9;
}

.choice {
display:block;
width:100%;
margin:6px 0;
}

.story {
color:#93c5fd;
}
</style>
</head>

<body>

<div class="header">
<h2>🎬 Cyber Defense Campaign Mode</h2>
<div id="stats"></div>
</div>

<div class="panel" id="storyBox"></div>

<div class="panel" id="actionBox"></div>

<script>

let xp = 0;
let stage = 0;
let phase = "story"; // story or flashcard

const story = [
"🏢 Nexus Cyber Defense Unit detects suspicious activity from ShadowByte.",
"💀 ShadowByte launches phishing campaign targeting employees.",
"🔥 Malware activity detected inside internal systems.",
"⚠️ Possible ransomware preparation detected.",
"🚨 Final breach attempt underway!"
];

const incidents = [
{
q:"ShadowByte phishing emails detected. What do you do?",
a:[
["Block sender domain", 10],
["Ignore emails", -10],
["Enable MFA enforcement", 15]
],
ex:"Blocking domains + MFA reduces phishing success."
},
{
q:"Suspicious malware detected. First action?",
a:[
["Isolate system", 15],
["Open file", -20],
["Ignore alert", -10]
],
ex:"Isolation prevents spread of malware."
}
];

const flashcards = [
{
q:"What does CIA stand for in cybersecurity?",
a:["Confidentiality, Integrity, Availability","Control, Identity, Access","Cyber Intelligence Agency","Central Internet Access"],
correct:0,
ex:"CIA triad is a core security principle."
},
{
q:"What is MFA?",
a:["Multi-Factor Authentication","Main Firewall Access","Malware Filter Agent","Managed File Authorization"],
correct:0,
ex:"MFA uses multiple verification methods."
},
{
q:"What is ransomware?",
a:["Malware that encrypts files","Firewall tool","Backup system","VPN service"],
correct:0,
ex:"Ransomware locks data for ransom."
}
];

function updateStats(){
document.getElementById("stats").innerText =
`XP: ${xp} | Stage: ${stage+1} | Mode: ${phase}`;
}

function load(){
updateStats();

if(phase === "story"){
document.getElementById("storyBox").innerHTML =
"<div class='story'>" + story[stage] + "</div>";

document.getElementById("actionBox").innerHTML =
"<button onclick='nextIncident()'>Continue Mission</button>";
}

if(phase === "incident"){
let inc = incidents[stage % incidents.length];

document.getElementById("storyBox").innerHTML =
"<b>🚨 Incident:</b><br>" + inc.q;

let box = document.getElementById("actionBox");
box.innerHTML = "";

inc.a.forEach(opt=>{
let b = document.createElement("button");
b.className = "choice";
b.innerText = opt[0];
b.onclick = ()=>{
xp += opt[1];
loadFlashcard();
};
box.appendChild(b);
});
}

if(phase === "flashcard"){
let card = flashcards[stage % flashcards.length];

document.getElementById("storyBox").innerHTML =
"<b>🧠 Training Flashcard:</b><br><br>" + card.q;

let box = document.getElementById("actionBox");
box.innerHTML = "";

card.a.forEach((ans,i)=>{
let b = document.createElement("button");
b.className = "choice";
b.innerText = ans;
b.onclick = ()=>checkFlash(i,card);
box.appendChild(b);
});
}
}

function nextIncident(){
phase = "incident";
load();
}

function loadFlashcard(){
phase = "flashcard";
load();
}

function checkFlash(i,card){
if(i === card.correct){
xp += 10;
document.getElementById("storyBox").innerHTML =
"✔ Correct!<br><br>" + card.ex;
} else {
document.getElementById("storyBox").innerHTML =
"✘ Wrong<br><br>" + card.ex;
}

setTimeout(()=>{
stage++;
phase = "story";
load();
},1500);
}

load();

</script>

</body>
</html>
