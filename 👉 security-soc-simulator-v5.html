<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Simulator - Security+ RPG</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#050816;
    color:white;
}

.header {
    padding:15px;
    background:#0f172a;
    text-align:center;
}

.dashboard {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    padding:10px;
}

.panel {
    background:#111c33;
    padding:10px;
    border-radius:10px;
}

.alert {
    background:#1e293b;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.alert:hover {
    background:#334155;
}

button {
    margin:5px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:#0ea5e9;
}

.stats {
    font-size:14px;
    color:#93c5fd;
}
</style>
</head>

<body>

<div class="header">
<h2>🛡 SOC Security+ Simulator</h2>
<div class="stats" id="stats"></div>
</div>

<div class="dashboard">

<div class="panel">
<h3>🚨 Active Alerts</h3>
<div id="alerts"></div>
</div>

<div class="panel">
<h3>📊 System Status</h3>
<p id="status"></p>
</div>

</div>

<div class="panel" style="margin:10px;">
<h3>🧠 Incident Response</h3>
<div id="incidentBox">Waiting for alerts...</div>
<div id="actions"></div>
</div>

<script>

let xp = 0;
let threat = 20;
let health = 100;

let currentIncident = null;

const incidents = [
{
title:"Phishing Campaign Detected",
desc:"Multiple employees received fake login emails.",
options:[
["Block sender + notify users", +10, -10],
["Ignore it", -10, +20],
["Reset all passwords immediately", +5, +5]
]
},

{
title:"Suspicious Login Activity",
desc:"Login attempts from unknown IP addresses.",
options:[
["Enable MFA enforcement", +10, -10],
["Do nothing", -10, +20],
["Disable firewall", -20, +30]
]
},

{
title:"Possible Malware Detected",
desc:"Endpoint flagged suspicious executable.",
options:[
["Isolate machine", +15, -15],
["Open file to inspect", -20, +25],
["Delete antivirus", -30, +40]
]
},

{
title:"Network Traffic Spike",
desc:"Unusual outbound traffic detected.",
options:[
["Analyze with SIEM tool", +15, -10],
["Ignore spike", -10, +20],
["Shut down network immediately", -5, +10]
]
}
];

function updateStats(){
document.getElementById("stats").innerText =
`XP: ${xp} | Threat: ${threat} | System Health: ${health}`;
}

function updateStatus(){
document.getElementById("status").innerText =
threat > 70 ? "🔥 HIGH RISK" :
threat > 40 ? "⚠️ MEDIUM RISK" :
"🟢 STABLE";
}

function loadAlerts(){
let box = document.getElementById("alerts");
box.innerHTML = "";

incidents.forEach((inc,i)=>{
let div = document.createElement("div");
div.className = "alert";
div.innerText = inc.title;
div.onclick = ()=>loadIncident(i);
box.appendChild(div);
});
}

function loadIncident(i){
currentIncident = incidents[i];

document.getElementById("incidentBox").innerHTML =
"<b>" + currentIncident.title + "</b><br>" +
currentIncident.desc;

let actions = document.getElementById("actions");
actions.innerHTML = "";

currentIncident.options.forEach(opt=>{
let b = document.createElement("button");
b.innerText = opt[0];
b.onclick = ()=>applyChoice(opt);
actions.appendChild(b);
});
}

function applyChoice(opt){
xp += opt[1];
threat += opt[2];

if(threat < 0) threat = 0;
if(threat > 100) threat = 100;

if(threat > 80) health -= 10;

updateStats();
updateStatus();
}

loadAlerts();
updateStats();
updateStatus();

</script>

</body>
</html>
